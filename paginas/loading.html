<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="/js/shared/rk-loading-screen.js?v=1.0.3"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="../js/firebase-auth-bootstrap.js?v=0.9.0"></script>
    <script src="../js/shared/rk-auth.js?v=0.9.2" data-rk-auth="protected"></script>
    <title>Carregando - RK Vidraçaria</title>
    <link rel="stylesheet" href="../css/style.css?v=5.8.0">

    <meta name="theme-color" content="#083d67">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RK Vidraçaria">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="apple-touch-icon" href="../imagens/icons/icon-192.png">
</head>
<body>
    <main aria-label="Preparando o sistema">
        <noscript>Ative o JavaScript para acessar a área da equipe.</noscript>
    </main>

    <script>
        (async function () {
            const token = window.RKLoading?.start("Validando seu acesso e preparando o dashboard...", "entrada-sistema");
            const sessao = await RKAuth.aguardarAutenticacao();
            if (!sessao?.logado) {
                if (token) window.RKLoading?.finish(token);
                return;
            }
            window.RKLoading?.update(78, "Acesso confirmado. Abrindo sua área de trabalho...");
            setTimeout(() => {
                try { sessionStorage.setItem("conecte_loading_transition_v1", "dashboard"); } catch (_) {}
                window.location.replace("dashboard-comercial.html");
            }, 650);
        })();
    </script>
    <script src="../js/app-install.js?v=3.2.1"></script>
  <script src="../js/conecte-signature.js?v=20260722"></script>
</body>
</html>
