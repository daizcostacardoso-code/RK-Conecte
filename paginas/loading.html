<!DOCTYPE html>
<html lang="pt-BR" class="rk-loading-active">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Carregando - RK Vidraçaria</title>

    <meta name="theme-color" content="#041522">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RK Vidraçaria">
    <link rel="manifest" href="../manifest.webmanifest?v=20260722-splash2">
    <link rel="apple-touch-icon" href="../imagens/icons/icon-192.png?v=20260722-splash2">
    <link rel="preload" href="/imagens/icons/rk-splash-mark-256.png" as="image" fetchpriority="high">
    <link rel="preload" href="/assets/conecte-logo.png" as="image">

    <!--
      Primeira pintura do PWA: este bloco não depende de JavaScript, Firebase
      nem de folhas externas. Ele substitui imediatamente a tela vazia entre
      o splash nativo e o carregador completo do sistema.
    -->
    <style id="rkPwaBootStyles">
        :root { color-scheme: dark; }
        html, body {
            width: 100%;
            min-width: 280px;
            min-height: 100%;
            margin: 0;
            background: #041522;
        }
        html.rk-loading-active body { overflow: hidden; }
        #rkPwaBootScreen {
            --rk-load-blue: #0d69d5;
            --rk-load-cyan: #22d3ee;
            position: fixed;
            z-index: 2147483599;
            inset: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            overflow: hidden auto;
            box-sizing: border-box;
            background:
                radial-gradient(circle at 83% 16%, rgba(34, 211, 238, .24), transparent 28%),
                radial-gradient(circle at 12% 82%, rgba(13, 105, 213, .28), transparent 34%),
                linear-gradient(145deg, #041522 0%, #082b45 48%, #0a5274 100%);
            color: #eaf7ff;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }
        #rkPwaBootScreen::before,
        #rkPwaBootScreen::after {
            content: "";
            position: absolute;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,.12);
            background: linear-gradient(135deg, rgba(255,255,255,.11), rgba(255,255,255,.015));
            box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
            transform: rotate(19deg);
        }
        #rkPwaBootScreen::before { width: 42vw; height: 72vh; top: -34vh; right: -8vw; border-radius: 44px; }
        #rkPwaBootScreen::after { width: 36vw; height: 56vh; bottom: -32vh; left: -9vw; border-radius: 50%; }
        .rk-pwa-boot-card {
            position: relative;
            z-index: 1;
            width: min(100%, 520px);
            min-width: 0;
            display: grid;
            gap: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 28px;
            background: linear-gradient(155deg, rgba(5,31,50,.88), rgba(8,55,81,.78));
            box-shadow: 0 28px 80px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.13);
            backdrop-filter: blur(18px);
            padding: clamp(24px, 5vw, 40px);
            text-align: center;
        }
        .rk-pwa-boot-company { display: grid; justify-items: center; gap: 12px; }
        .rk-pwa-boot-logo {
            width: 78px;
            height: 78px;
            object-fit: contain;
            border-radius: 20px;
            filter: drop-shadow(0 12px 22px rgba(0,0,0,.28));
        }
        .rk-pwa-boot-kicker { color: #79e8f5; font-size: .72rem; font-weight: 850; letter-spacing: .12em; text-transform: uppercase; }
        .rk-pwa-boot-card h1 { max-width: 430px; margin: 0; color: #fff; font-size: clamp(1.65rem, 6vw, 2.35rem); line-height: 1.08; letter-spacing: -.035em; }
        .rk-pwa-boot-message { min-height: 1.5em; margin: 0; color: #c7dce9; font-size: clamp(.9rem, 2.8vw, 1rem); line-height: 1.5; }
        .rk-pwa-boot-progress-wrap { display: grid; gap: 9px; text-align: left; }
        .rk-pwa-boot-progress-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: #bcd3e1; font-size: .72rem; font-weight: 750; }
        .rk-pwa-boot-progress {
            position: relative;
            height: 9px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.13);
            border-radius: 999px;
            background: rgba(0,0,0,.2);
        }
        .rk-pwa-boot-progress > span {
            position: absolute;
            inset: 0 auto 0 0;
            width: 34%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--rk-load-blue), var(--rk-load-cyan), #e5fbff);
            box-shadow: 0 0 18px rgba(34,211,238,.55);
            animation: rkPwaBootProgress 1.15s ease-in-out infinite alternate;
        }
        .rk-pwa-boot-meta { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
        .rk-pwa-boot-meta > div { min-width: 0; display: grid; gap: 4px; border: 1px solid rgba(255,255,255,.1); border-radius: 13px; background: rgba(255,255,255,.055); padding: 11px 12px; text-align: left; }
        .rk-pwa-boot-meta span { color: #91afc1; font-size: .64rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
        .rk-pwa-boot-meta strong { color: #effaff; font-size: .8rem; overflow-wrap: anywhere; }
        .rk-pwa-boot-network { display: inline-flex; align-items: center; gap: 7px; }
        .rk-pwa-boot-network::before { content: ""; width: 8px; height: 8px; flex: 0 0 auto; border-radius: 50%; background: #43e3a0; box-shadow: 0 0 0 4px rgba(67,227,160,.12); }
        .rk-pwa-boot-powered { display: grid; justify-items: center; gap: 5px; }
        .rk-pwa-boot-powered > span { color: #86a6b9; font-size: .59rem; font-weight: 750; letter-spacing: .06em; text-transform: uppercase; }
        .rk-pwa-boot-powered img { width: 126px; height: 51px; object-fit: contain; border-radius: 9px; opacity: .94; }
        html:not(.rk-loading-active) #rkPwaBootScreen { display: none; }
        @keyframes rkPwaBootProgress {
            from { transform: translateX(-30%); opacity: .72; }
            to { transform: translateX(210%); opacity: 1; }
        }
        @media (max-width: 520px) {
            #rkPwaBootScreen { place-items: stretch center; padding-inline: 12px; }
            .rk-pwa-boot-card { align-self: center; gap: 16px; border-radius: 22px; padding: 24px 18px; }
            .rk-pwa-boot-logo { width: 68px; height: 68px; border-radius: 17px; }
            .rk-pwa-boot-meta { grid-template-columns: 1fr; }
            .rk-pwa-boot-meta > div { grid-template-columns: 84px minmax(0,1fr); align-items: center; }
        }
        @media (prefers-reduced-motion: reduce) {
            .rk-pwa-boot-progress > span { animation: none; width: 45%; }
        }
    </style>

    <script defer src="/js/shared/rk-loading-screen.js?v=1.0.5"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script defer src="../js/firebase-auth-bootstrap.js?v=0.9.0"></script>
    <script defer src="../js/shared/rk-auth.js?v=0.9.2" data-rk-auth="protected"></script>
    <script defer src="../js/app-install.js?v=3.2.1"></script>
    <script defer src="../js/conecte-signature.js?v=20260722c"></script>
</head>
<body>
    <div id="rkPwaBootScreen" role="status" aria-live="polite" aria-label="Preparando o sistema">
        <section class="rk-pwa-boot-card">
            <div class="rk-pwa-boot-company">
                <img class="rk-pwa-boot-logo" src="/imagens/icons/rk-splash-mark-256.png" alt="Símbolo RK Vidraçaria" width="256" height="256" fetchpriority="high">
                <span class="rk-pwa-boot-kicker">RK Vidraçaria · Gestão integrada</span>
                <h1>Preparando tudo para você</h1>
                <p class="rk-pwa-boot-message">Validando seu acesso e preparando o dashboard...</p>
            </div>
            <div class="rk-pwa-boot-progress-wrap">
                <div class="rk-pwa-boot-progress-top"><span>Carregando informações</span><strong>Iniciando</strong></div>
                <div class="rk-pwa-boot-progress" aria-hidden="true"><span></span></div>
            </div>
            <div class="rk-pwa-boot-meta">
                <div><span>Situação</span><strong class="rk-pwa-boot-network">Preparando recursos locais</strong></div>
                <div><span>Modo</span><strong>Aplicativo instalado</strong></div>
            </div>
            <footer class="rk-pwa-boot-powered">
                <span>Tecnologia que conecta sua operação</span>
                <img src="/assets/conecte-logo.png" alt="Conecte">
            </footer>
        </section>
    </div>

    <main aria-label="Preparando o sistema">
        <noscript>Ative o JavaScript para acessar a área da equipe.</noscript>
    </main>

    <script>
        window.addEventListener("DOMContentLoaded", async () => {
            try {
                const token = window.RKLoading?.start("Validando seu acesso e preparando o dashboard...", "entrada-sistema");
                const sessao = await window.RKAuth?.aguardarAutenticacao?.();
                if (!sessao?.logado) {
                    if (token) window.RKLoading?.finish(token);
                    return;
                }
                window.RKLoading?.update(78, "Acesso confirmado. Abrindo sua área de trabalho...");
                setTimeout(() => {
                    window.location.replace("dashboard-comercial.html");
                }, 650);
            } catch (erro) {
                console.error("Falha ao preparar a abertura do PWA", erro);
                window.RKLoading?.fail("Não foi possível preparar o aplicativo. Verifique a conexão e tente novamente.");
            }
        }, { once: true });
    </script>
</body>
</html>
