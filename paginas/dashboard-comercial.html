    <!-- Estilos legados mantidos apenas como referencia; o layout atual vive em dashboard-comercial.css. -->
    <style media="not all">
        .dashboard-comercial-page {
            background: #f6f8f7;
            color: #17201f;
        }

        .dashboard-comercial-main {
            min-height: calc(100vh - 180px);
            padding: 28px 0 48px;
        }

        .dashboard-comercial-shell {
            max-width: 1180px;
            margin: 0 auto;
            border: 1px solid #dce7e3;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 14px 34px rgba(17, 24, 39, 0.08);
            overflow: hidden;
        }

        .dashboard-comercial-header {
            position: relative !important;
            z-index: auto !important;
            min-height: auto !important;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            padding: 22px 24px;
            border: 0 !important;
            border-bottom: 1px solid #e5ece9 !important;
            background: linear-gradient(135deg, #ffffff 0%, #eef8f5 58%, #eef5ff 100%) !important;
            box-shadow: none !important;
        }

        .dashboard-comercial-header > div {
            min-width: 0;
            max-width: 720px;
        }

        .dashboard-comercial-eyebrow {
            margin: 0 0 6px;
            color: #0f766e;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .dashboard-comercial-header h1 {
            margin: 0;
            color: #13201d;
            font-size: clamp(1.45rem, 2.4vw, 2rem);
            line-height: 1.12;
        }

        .dashboard-comercial-subtitle {
            max-width: 620px;
            margin: 7px 0 0;
            color: #55635f;
            font-size: 0.94rem;
            line-height: 1.45;
        }

        .dashboard-comercial-refresh {
            flex: 0 0 auto;
            min-height: 42px;
            border: 1px solid #0f766e;
            border-radius: 6px;
            background: #0f766e;
            color: #ffffff;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            padding: 8px 14px;
        }

        .dashboard-comercial-refresh:hover,
        .dashboard-comercial-refresh:focus-visible {
            background: #0b5f59;
            outline: none;
        }

        .dashboard-comercial-refresh:focus-visible {
            outline: 2px solid #99d6ce;
            outline-offset: 2px;
        }

        .dashboard-comercial-content {
            display: grid;
            gap: 20px;
            padding: 24px;
            background: #fbfcfb;
        }

        .dashboard-comercial-section,
        .dashboard-comercial-panel {
            border: 1px solid #dfe8e5;
            border-radius: 8px;
            background: #ffffff;
            padding: 18px;
        }

        .dashboard-comercial-section-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .dashboard-comercial-section-top h2 {
            margin: 0;
            color: #25302e;
            font-size: 0.95rem;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .dashboard-comercial-section-top span {
            color: #64716e;
            font-size: 0.84rem;
        }

        .dashboard-comercial-cards {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        .dashboard-comercial-card {
            min-height: 118px;
            border: 1px solid #dfe8e5;
            border-radius: 8px;
            background: #f8fbfa;
            display: grid;
            align-content: space-between;
            gap: 10px;
            padding: 16px;
        }

        .dashboard-comercial-card span,
        .dashboard-comercial-card small,
        .dashboard-comercial-action strong,
        .dashboard-comercial-value span,
        .dashboard-comercial-value-list span {
            color: #60706c;
            font-size: 0.86rem;
        }

        .dashboard-comercial-card strong {
            color: #13201d;
            font-size: 2rem;
            line-height: 1;
        }

        .dashboard-comercial-compact-kpis {
            display: none;
        }

        .dashboard-comercial-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 0.8fr);
            gap: 16px;
            border: 0;
            background: transparent;
            padding: 0;
        }

        .dashboard-comercial-value {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .dashboard-comercial-value strong {
            color: #0f766e;
            font-size: 2rem;
            line-height: 1;
        }

        .dashboard-comercial-value-list,
        .dashboard-comercial-actions,
        .dashboard-comercial-activities {
            display: grid;
            gap: 10px;
        }

        .dashboard-comercial-value-list div,
        .dashboard-comercial-action,
        .dashboard-comercial-activity {
            border: 1px solid #edf2f0;
            border-radius: 6px;
            background: #fbfcfb;
            padding: 10px 12px;
        }

        .dashboard-comercial-value-list div,
        .dashboard-comercial-action {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .dashboard-comercial-value-list strong,
        .dashboard-comercial-action span,
        .dashboard-comercial-activity strong {
            color: #17201f;
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .dashboard-comercial-action strong,
        .dashboard-comercial-value-list strong {
            text-align: right;
        }

        .dashboard-comercial-activity strong {
            line-height: 1.35;
        }

        .dashboard-comercial-table-wrap {
            overflow-x: auto;
        }

        .dashboard-comercial-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        .dashboard-comercial-table th,
        .dashboard-comercial-table td {
            border-bottom: 1px solid #edf2f0;
            padding: 12px 10px;
            text-align: left;
        }

        .dashboard-comercial-table th {
            color: #53615e;
            font-size: 0.78rem;
            text-transform: uppercase;
        }

        .dashboard-comercial-table td {
            color: #20302d;
            font-size: 0.94rem;
        }

        .dashboard-comercial-activity {
            display: grid;
            gap: 4px;
        }

        .dashboard-comercial-activity span {
            color: #0f766e;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .dashboard-comercial-activity small,
        .dashboard-comercial-empty p,
        .dashboard-comercial-value-list p {
            margin: 0;
            color: #64716e;
        }

        .dashboard-comercial-empty {
            border: 1px dashed #cbd8d3;
            border-radius: 8px;
            background: #fbfcfb;
            padding: 22px;
            text-align: center;
        }

        .dashboard-comercial-shortcuts .botao {
            gap: 8px;
        }

        .dashboard-comercial-shortcut-icon,
        .dashboard-comercial-shortcut-desc {
            display: none;
        }

        .dashboard-comercial-shortcut-title {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        @media (max-width: 980px) {
            .dashboard-comercial-cards,
            .dashboard-comercial-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 680px) {
            body.dashboard-comercial-page .rk-demo-banner {
                display: none !important;
            }

            .dashboard-comercial-main {
                padding: 8px 0 22px;
            }

            .dashboard-comercial-shell {
                border-radius: 8px;
                box-shadow: 0 8px 20px rgba(17, 24, 39, 0.06);
            }

            .dashboard-comercial-header,
            .dashboard-comercial-content {
                padding: 10px 12px;
            }

            .dashboard-comercial-header {
                align-items: center;
                flex-direction: row;
                gap: 12px;
            }

            .dashboard-comercial-header > div {
                flex: 1 1 auto;
            }

            .dashboard-comercial-eyebrow {
                display: none;
            }

            .dashboard-comercial-header h1 {
                font-size: 1.05rem;
                line-height: 1.1;
            }

            .dashboard-comercial-subtitle {
                display: none;
            }

            .dashboard-comercial-refresh {
                width: auto;
                min-height: 28px;
                margin-left: auto;
                border-color: #c7dafa;
                background: #ffffff;
                color: #0b48b6;
                font-size: 0.72rem;
                padding: 4px 8px;
            }

            .dashboard-comercial-refresh:hover,
            .dashboard-comercial-refresh:focus-visible {
                background: #eff7ff;
            }

            .dashboard-comercial-content {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .dashboard-comercial-section,
            .dashboard-comercial-panel {
                padding: 10px 12px;
            }

            .dashboard-comercial-section-top,
            .dashboard-comercial-value,
            .dashboard-comercial-value-list div,
            .dashboard-comercial-action {
                align-items: stretch;
                flex-direction: column;
            }

            .dashboard-comercial-section-top {
                gap: 5px;
                margin-bottom: 8px;
            }

            .dashboard-comercial-section-top h2 {
                font-size: 0.78rem;
            }

            .dashboard-comercial-resumo .dashboard-comercial-section-top {
                align-items: center;
                flex-direction: row;
                margin-bottom: 4px;
            }

            .dashboard-comercial-resumo .dashboard-comercial-section-top span {
                display: none;
            }

            .dashboard-comercial-atalhos {
                order: 1;
            }

            .dashboard-comercial-resumo {
                order: 2;
            }

            .dashboard-comercial-atividades {
                order: 3;
            }

            .dashboard-comercial-negociacao-acoes {
                display: contents;
            }

            .dashboard-comercial-panel-acoes {
                order: 4;
            }

            .dashboard-comercial-panel-valor {
                order: 5;
            }

            .dashboard-comercial-orcamentos {
                order: 6;
            }

            .dashboard-comercial-atalhos .dashboard-comercial-section-top span {
                display: none;
            }

            .dashboard-comercial-cards,
            .dashboard-comercial-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-comercial-resumo .dashboard-comercial-cards {
                display: none;
            }

            .dashboard-comercial-compact-kpis {
                display: grid;
                gap: 0;
                margin: 0;
            }

            .dashboard-comercial-compact-kpis div {
                min-height: 29px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                border-bottom: 1px solid #edf2f7;
                padding: 5px 0;
            }

            .dashboard-comercial-compact-kpis div:last-child {
                border-bottom: 0;
            }

            .dashboard-comercial-compact-kpis dt {
                color: #4d5f6f;
                font-size: 0.82rem;
                font-weight: 700;
                line-height: 1.2;
            }

            .dashboard-comercial-compact-kpis dd {
                margin: 0;
                color: #0b48b6;
                font-size: 0.86rem;
                font-weight: 800;
                line-height: 1.2;
                text-align: right;
                white-space: nowrap;
            }

            body.dashboard-comercial-page .dashboard-comercial-shortcuts {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 8px;
            }

            body.dashboard-comercial-page .dashboard-comercial-shortcuts .botao {
                width: auto !important;
                min-height: 62px;
                display: grid;
                grid-template-columns: 24px minmax(0, 1fr);
                align-items: center;
                align-content: center;
                justify-items: stretch;
                gap: 8px;
                border: 1px solid #d7e8f5;
                border-radius: 7px;
                background: #fbfdff;
                box-shadow: none;
                color: #17201f;
                line-height: 1.2;
                padding: 8px;
                text-align: left;
                transform: none;
            }

            .dashboard-comercial-shortcuts .botao:hover,
            .dashboard-comercial-shortcuts .botao:focus-visible {
                background: #eff7ff;
                transform: none;
            }

            .dashboard-comercial-shortcut-icon {
                width: 22px;
                height: 22px;
                border: 1px solid #bddaf4;
                border-radius: 6px;
                background: #e9faff;
                color: #0b48b6;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                font-size: 0.62rem;
                font-weight: 800;
            }

            .dashboard-comercial-shortcut-copy {
                min-width: 0;
                display: grid;
                gap: 2px;
            }

            .dashboard-comercial-shortcut-title {
                display: block;
                color: #17201f;
                font-size: 0.79rem;
                line-height: 1.12;
            }

            .dashboard-comercial-shortcut-desc {
                display: block;
                color: #647487;
                font-size: 0.66rem;
                font-weight: 600;
                line-height: 1.15;
            }

            .dashboard-comercial-action strong,
            .dashboard-comercial-value-list strong {
                text-align: left;
            }
        }
    </style>
