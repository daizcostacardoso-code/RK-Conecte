<head>
    <meta charset="UTF-8">

    <title>Dashboard Comercial - RK Vidra&ccedil;aria</title>

    <link rel="stylesheet" href="../css/style.css?v=4.8.0">

    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        .dashboard-comercial-page {
            background: #f6f8f7;
            color: #17201f;
        }

        .dashboard-comercial-main {
            min-height: calc(100vh - 180px);
            padding: 28px 0 48px;
        }

        .dashboard-comercial-shell {
            max-width: 1180px;
            margin: 0 auto;
            border: 1px solid #d9e3df;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
            overflow: hidden;
        }

        .dashboard-comercial-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 24px;
            border-bottom: 1px solid #e5ece9;
            background: #ffffff;
        }

        .dashboard-comercial-eyebrow {
            margin: 0 0 8px;
            color: #0f766e;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .dashboard-comercial-header h1 {
            margin: 0;
            font-size: clamp(1.9rem, 4vw, 2.8rem);
            line-height: 1.05;
        }

        .dashboard-comercial-refresh {
            min-height: 42px;
            border: 1px solid #0f766e;
            border-radius: 6px;
            background: #0f766e;
            color: #ffffff;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            padding: 8px 14px;
        }

        .dashboard-comercial-refresh:hover,
        .dashboard-comercial-refresh:focus-visible {
            background: #0b5f59;
            outline: none;
        }

        .dashboard-comercial-content {
            display: grid;
            gap: 20px;
            padding: 24px;
            background: #fbfcfb;
        }

        .dashboard-comercial-section,
        .dashboard-comercial-panel {
            border: 1px solid #dfe8e5;
            border-radius: 8px;
            background: #ffffff;
            padding: 18px;
        }

        .dashboard-comercial-section-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .dashboard-comercial-section-top h2 {
            margin: 0;
            color: #25302e;
            font-size: 0.95rem;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .dashboard-comercial-section-top span {
            color: #64716e;
            font-size: 0.84rem;
        }

        .dashboard-comercial-cards {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        .dashboard-comercial-card {
            min-height: 118px;
            border: 1px solid #dfe8e5;
            border-radius: 8px;
            background: #f8fbfa;
            display: grid;
            align-content: space-between;
            gap: 10px;
            padding: 16px;
        }

        .dashboard-comercial-card span,
        .dashboard-comercial-card small,
        .dashboard-comercial-action strong,
        .dashboard-comercial-value span,
        .dashboard-comercial-value-list span {
            color: #60706c;
            font-size: 0.86rem;
        }

        .dashboard-comercial-card strong {
            color: #13201d;
            font-size: 2rem;
            line-height: 1;
        }

        .dashboard-comercial-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 0.8fr);
            gap: 16px;
            border: 0;
            background: transparent;
            padding: 0;
        }

        .dashboard-comercial-value {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .dashboard-comercial-value strong {
            color: #0f766e;
            font-size: 2rem;
            line-height: 1;
        }

        .dashboard-comercial-value-list,
        .dashboard-comercial-actions,
        .dashboard-comercial-activities {
            display: grid;
            gap: 10px;
        }

        .dashboard-comercial-value-list div,
        .dashboard-comercial-action,
        .dashboard-comercial-activity {
            border: 1px solid #edf2f0;
            border-radius: 6px;
            background: #fbfcfb;
            padding: 10px 12px;
        }

        .dashboard-comercial-value-list div,
        .dashboard-comercial-action {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .dashboard-comercial-value-list strong,
        .dashboard-comercial-action span,
        .dashboard-comercial-activity strong {
            color: #17201f;
        }

        .dashboard-comercial-table-wrap {
            overflow-x: auto;
        }

        .dashboard-comercial-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        .dashboard-comercial-table th,
        .dashboard-comercial-table td {
            border-bottom: 1px solid #edf2f0;
            padding: 12px 10px;
            text-align: left;
        }

        .dashboard-comercial-table th {
            color: #53615e;
            font-size: 0.78rem;
            text-transform: uppercase;
        }

        .dashboard-comercial-table td {
            color: #20302d;
            font-size: 0.94rem;
        }

        .dashboard-comercial-activity {
            display: grid;
            gap: 4px;
        }

        .dashboard-comercial-activity span {
            color: #0f766e;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .dashboard-comercial-activity small,
        .dashboard-comercial-empty p,
        .dashboard-comercial-value-list p {
            margin: 0;
            color: #64716e;
        }

        .dashboard-comercial-empty {
            border: 1px dashed #cbd8d3;
            border-radius: 8px;
            background: #fbfcfb;
            padding: 22px;
            text-align: center;
        }

        @media (max-width: 980px) {
            .dashboard-comercial-cards,
            .dashboard-comercial-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 680px) {
            .dashboard-comercial-main {
                padding: 18px 0 32px;
            }

            .dashboard-comercial-header,
            .dashboard-comercial-content {
                padding: 18px;
            }

            .dashboard-comercial-header,
            .dashboard-comercial-section-top,
            .dashboard-comercial-value,
            .dashboard-comercial-value-list div,
            .dashboard-comercial-action {
                align-items: stretch;
                flex-direction: column;
            }

            .dashboard-comercial-cards,
            .dashboard-comercial-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-comercial-refresh {
                width: 100%;
            }
        }
    </style>
</head>
