<head>

    <style>
        .comercial-page {
            background: #f6f8f7;
            color: #17201f;
        }

        .comercial-main {
            min-height: calc(100vh - 180px);
            padding: 32px 0 48px;
        }

        .comercial-shell {
            max-width: 1160px;
            margin: 0 auto;
            border: 1px solid #d9e3df;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
            overflow: hidden;
        }

        .comercial-header {
            padding: 24px;
            border-bottom: 1px solid #e5ece9;
            background: #ffffff;
        }

        .comercial-eyebrow {
            margin: 0 0 8px;
            color: #0f766e;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .comercial-header h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.05;
        }

        .comercial-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .comercial-summary span {
            border: 1px solid #d9e3df;
            border-radius: 999px;
            background: #f8fbfa;
            color: #40504d;
            font-size: 0.9rem;
            padding: 6px 10px;
        }

        .comercial-grid {
            display: grid;
            grid-template-columns: minmax(280px, 0.85fr) minmax(0, 1.5fr);
            min-height: 560px;
        }

        .comercial-panel {
            padding: 24px;
            border-right: 1px solid #e5ece9;
            background: #fbfcfb;
        }

        .comercial-section {
            padding: 18px 0;
            border-bottom: 1px solid #edf2f0;
        }

        .comercial-section:first-child {
            padding-top: 0;
        }

        .comercial-section:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .comercial-section h2 {
            margin: 0 0 12px;
            color: #25302e;
            font-size: 0.9rem;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .comercial-status {
            display: grid;
            gap: 8px;
            border: 1px solid #dfe8e5;
            border-left: 4px solid #60736f;
            border-radius: 8px;
            background: #ffffff;
            padding: 14px;
        }

        .comercial-status[data-status="EM_REVISAO"] {
            border-left-color: #b7791f;
        }

        .comercial-status[data-status="APROVADO"] {
            border-left-color: #0f766e;
        }

        .comercial-status[data-status="REPROVADO"] {
            border-left-color: #b91c1c;
        }

        .comercial-status strong {
            font-size: 1.1rem;
        }

        .comercial-status span,
        .comercial-note {
            margin: 0;
            color: #52605d;
            font-size: 0.94rem;
            line-height: 1.45;
        }

        .comercial-actions {
            display: grid;
            gap: 10px;
        }

        .comercial-button {
            width: 100%;
            min-height: 46px;
            border: 1px solid #cbd8d3;
            border-radius: 6px;
            background: #ffffff;
            color: #16211f;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            font: inherit;
            transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
        }

        .comercial-button:hover,
        .comercial-button:focus-visible {
            border-color: #0f766e;
            background: #eef8f6;
            outline: none;
        }

        .comercial-button:disabled {
            border-color: #dfe8e5;
            background: #f4f7f6;
            color: #8a9693;
            cursor: not-allowed;
        }

        .comercial-preview-area {
            min-width: 0;
            padding: 24px;
            background: #ffffff;
        }

        .comercial-message,
        .comercial-preview {
            border: 1px solid #dfe8e5;
            border-radius: 8px;
            background: #ffffff;
        }

        .comercial-message {
            margin-bottom: 14px;
            padding: 14px 16px;
        }

        .comercial-message p {
            margin: 0;
            color: #4c5b58;
        }

        .comercial-message[data-tipo="erro"] {
            border-color: #f3b4b4;
            background: #fff5f5;
        }

        .comercial-message[data-tipo="sucesso"] {
            border-color: #a7d9c8;
            background: #f1fbf7;
        }

        .comercial-preview {
            min-height: 460px;
            overflow: auto;
            padding: 18px;
        }

        .comercial-preview-empty {
            min-height: 420px;
            display: grid;
            place-items: center;
            color: #6b7774;
            text-align: center;
        }

        .comercial-preview-empty p {
            margin: 0;
        }

        @media (max-width: 900px) {
            .comercial-grid {
                grid-template-columns: 1fr;
            }

            .comercial-panel {
                border-right: 0;
                border-bottom: 1px solid #e5ece9;
            }
        }

        @media (max-width: 560px) {
            .comercial-main {
                padding: 18px 0 32px;
            }

            .comercial-header,
            .comercial-panel,
            .comercial-preview-area {
                padding: 18px;
            }
        }
    </style>
</head>
